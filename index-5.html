// ---------------- Monte Carlo ----------------
const SIMS=250;
function randn(){let u=0,v=0;while(u===0)u=Math.random();while(v===0)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function runmc({start,contrib,years,ret,vol,infl=2.5}){
  const mu=ret/100,sig=vol/100;let ok=0;const by=Array.from({length:years+1},()=>[]);
  for(let s=0;s<SIMS;s++){let b=start;by[0].push(b);for(let y=1;y<=years;y++){b=b*(1+mu+sig*randn())+contrib;if(b<0)b=0;by[y].push(b);}if(b>0)ok++;}
  const path=by.map((arr,y)=>{const a=arr.slice().sort((x,z)=>x-z);const at=(p)=>a[Math.min(a.length-1,Math.floor(p/100*a.length))];return {y,p10:at(10),p50:at(50),p90:at(90)};});
  return {path};
}

// ---------------- charts ----------------
function Spark({data,w=330,h=54}){
  const mn=Math.min(...data)*0.985,mx=Math.max(...data)*1.005;
  const x=i=>i/(data.length-1)*w, y=v=>h-(v-mn)/(mx-mn)*(h-8)-2;
  const ln=data.map((v,i)=>(i?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)).join(" ");
  return <svg width="100%" height={h} viewBox={"0 0 "+w+" "+h} preserveAspectRatio="none"><defs><linearGradient id="sp" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c.sage} stopOpacity="0.5"/><stop offset="100%" stopColor={c.sage} stopOpacity="0"/></linearGradient></defs><path d={ln+" L "+w+" "+h+" L 0 "+h+" Z"} fill="url(#sp)"/><path d={ln} fill="none" stroke={c.sage} strokeWidth="2.5"/></svg>;
}
function Donut({data,size=108}){
  const R=size/2-4,r=size/2-22,cx=size/2,cy=size/2;let acc=0;
  const arcs=data.map(d=>{const v=d.pct;const a0=acc/100*2*Math.PI-Math.PI/2;acc+=v;const a1=acc/100*2*Math.PI-Math.PI/2;const bg=v>50?1:0;const P=(rad,a)=>[cx+rad*Math.cos(a),cy+rad*Math.sin(a)];const[x0,y0]=P(R,a0),[x1,y1]=P(R,a1),[x2,y2]=P(r,a1),[x3,y3]=P(r,a0);return {d:`M ${x0} ${y0} A ${R} ${R} 0 ${bg} 1 ${x1} ${y1} L ${x2} ${y2} A ${r} ${r} 0 ${bg} 0 ${x3} ${y3} Z`,color:d.color};});
  return <svg width={size} height={size}>{arcs.map((a,i)=><path key={i} d={a.d} fill={a.color} stroke={c.card} strokeWidth="2"/>)}</svg>;
}
function Fan({path,years,w=330,h=150}){
  const pad=42;const mx=Math.max(...path.map(p=>p.p90))*1.05||1;
  const x=y=>pad+y/years*(w-pad-6), Y=v=>6+(1-v/mx)*(h-24);
  const band=(lo,hi)=>path.map((p,i)=>(i?"L":"M")+x(p.y).toFixed(1)+" "+Y(p[hi]).toFixed(1)).join(" ")+" "+path.slice().reverse().map(p=>"L"+x(p.y).toFixed(1)+" "+Y(p[lo]).toFixed(1)).join(" ")+" Z";
  const med=path.map((p,i)=>(i?"L":"M")+x(p.y).toFixed(1)+" "+Y(p.p50).toFixed(1)).join(" ");
  return <svg width="100%" height={h} viewBox={"0 0 "+w+" "+h}><defs><linearGradient id="fn" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c.sage} stopOpacity="0.22"/><stop offset="100%" stopColor={c.sage} stopOpacity="0.03"/></linearGradient></defs>{[0,mx/2,mx].map((v,i)=><text key={i} x={pad-6} y={Y(v)+3} textAnchor="end" fontSize="9" fill={c.muted}>{big(v)}</text>)}<path d={band("p10","p90")} fill="url(#fn)"/><path d={med} fill="none" stroke={c.pine} strokeWidth="2.4"/>{[0,Math.round(years/2),years].map((t,i)=><text key={i} x={x(t)} y={h-2} textAnchor="middle" fontSize="9" fill={c.muted}>{"yr "+t}</text>)}</svg>;
}
function DualLine({a,b,w=330,h=140}){
  const all=a.concat(b);const mn=Math.min(...all)*0.99,mx=Math.max(...all)*1.01;
  const x=(i,n)=>40+i/(n-1)*(w-46), y=v=>8+(1-(v-mn)/(mx-mn))*(h-30);
  const path=arr=>arr.map((v,i)=>(i?"L":"M")+x(i,arr.length).toFixed(1)+" "+y(v).toFixed(1)).join(" ");
  return <svg width="100%" height={h} viewBox={"0 0 "+w+" "+h}><defs><linearGradient id="dl" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c.sage} stopOpacity="0.26"/><stop offset="100%" stopColor={c.sage} stopOpacity="0.02"/></linearGradient></defs>{[mn,(mn+mx)/2,mx].map((v,i)=><g key={i}><line x1="40" y1={y(v)} x2={w-6} y2={y(v)} stroke={c.line} strokeDasharray="2 3"/><text x="34" y={y(v)+3} textAnchor="end" fontSize="9" fill={c.muted}>{Math.round(v)}</text></g>)}<path d={path(a)+" L "+x(a.length-1,a.length)+" "+(h-22)+" L "+x(0,a.length)+" "+(h-22)+" Z"} fill="url(#dl)"/><path d={path(b)} fill="none" stroke={c.muted} strokeWidth="1.6" strokeDasharray="4 3"/><path d={path(a)} fill="none" stroke={c.pine} strokeWidth="2.6"/></svg>;
}

      </Card>}
      {view.g==="private" && <Card style={{marginTop:12}}><Eyebrow>Since inception</Eyebrow><div style={{fontSize:11,color:c.muted,marginTop:4,marginBottom:8,lineHeight:1.45}}>Private funds use IRR and multiple, not time-weighted return, since you don't control the cash-flow timing.</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 40px 40px 40px",gap:6,paddingBottom:7,borderBottom:"1px solid "+c.line}}><span style={{fontSize:9.5,color:c.muted,fontWeight:700}}>FUND</span><span style={{fontSize:9.5,color:c.muted,fontWeight:700,textAlign:"right"}}>IRR</span><span style={{fontSize:9.5,color:c.muted,fontWeight:700,textAlign:"right"}}>MOIC</span><span style={{fontSize:9.5,color:c.muted,fontWeight:700,textAlign:"right"}}>DPI</span></div>

function IPS(){
  const INIT={ "Return":"Preserve real purchasing power across generations while funding roughly $2.8M of annual lifestyle spending. Long-term target of about 6.5% net of fees.", "Risk":"Balanced posture. Built by role, not asset class: growth drivers carry return; defense is split across inflation-sensitive, deflation-sensitive, and pure diversifiers so it holds up across regimes rather than in one. Tolerate a drawdown near 20% in a poor year.", "Time horizon":"Multi-generational. Modeled over 30 years, but capital is intended to outlast the current generation and pass to the GST trust beneficiaries.", "Liquidity":"About 40% sits in private markets. Hold liquid reserves covering two years of spending plus outstanding capital commitments, so a call never forces a sale.", "Taxes":"Coordinate asset location across the trust, LLC, IRA, and taxable accounts. Manage the concentrated legacy position with an eye to gains realization and charitable offset.", "Legal & regulatory":"Six entities including an irrevocable GST trust. Confirm trustee powers, registrations, and beneficiary designations annually.", "Unique circumstances":"Concentrated legacy stock in the taxable account. Outstanding unfunded private market commitments. Next-gen beneficiaries brought into the plan progressively." };
  const [ips,setIps]=useState(INIT);const [edit,setEdit]=useState(null);
  const order=["Return","Risk","Time horizon","Liquidity","Taxes","Legal & regulatory","Unique circumstances"];
  return <div style={{padding:"6px 18px 0"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
      <div><Eyebrow>Policy</Eyebrow><div style={{fontSize:21,fontWeight:700,color:c.ink,marginTop:3}}>Investment Policy</div><div style={{fontSize:11.5,color:c.muted,marginTop:2,display:"flex",alignItems:"center",gap:5}}><I.clock size={11} color={c.muted}/> Last reviewed Apr 2026</div></div>
      <button style={{display:"flex",alignItems:"center",gap:5,border:"1px solid "+c.line,background:c.card,cursor:"pointer",color:c.pine,borderRadius:10,padding:"8px 11px",fontSize:12,fontWeight:700}}><I.down size={13} color={c.pine}/> PDF</button>
    </div>
    {order.map((k,i)=><Card key={k} style={{marginBottom:10,padding:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{width:20,height:20,borderRadius:6,background:c.sageSoft,color:c.pine,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{i+1}</span><span style={{fontSize:13.5,fontWeight:700,color:c.ink}}>{k}</span></div><button onClick={()=>setEdit(edit===k?null:k)} style={{border:"none",background:"transparent",cursor:"pointer",color:c.pine,fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:4}}>{edit===k?<><I.check size={13} color={c.pine}/> Done</>:<><I.pencil size={12} color={c.pine}/> Edit</>}</button></div>
      {edit===k ? <textarea value={ips[k]} onChange={e=>setIps({...ips,[k]:e.target.value})} rows={5} style={{width:"100%",border:"1.5px solid "+c.pine,borderRadius:10,padding:10,fontSize:12.5,color:c.ink,lineHeight:1.5,resize:"vertical",outline:"none"}}/> : <div style={{fontSize:12.5,color:c.muted,lineHeight:1.5}}>{ips[k]}</div>}
    </Card>)}
    <div style={{fontSize:10.5,color:c.muted,margin:"4px 2px 20px",lineHeight:1.45}}>Proposed edits route to your advisor for review before the policy is amended.</div>
  </div>;
}

function Research(){
  const [seg,setSeg]=useState("firm");
  return <div style={{padding:"6px 18px 0"}}>
    <div style={{marginBottom:14}}><Seg opts={[["firm","Sepio research"],["funds","Your funds"]]} val={seg} set={setSeg}/></div>
    {seg==="firm" && <>{RESEARCH.firm.map((r,i)=><button key={r.title} style={{width:"100%",textAlign:"left",cursor:"pointer",background:i===0?c.pineDeep:c.card,border:"1px solid "+(i===0?c.pineDeep:c.line),borderRadius:16,padding:16,marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:9.5,fontWeight:700,letterSpacing:"0.05em",color:i===0?c.sage:c.pine,background:i===0?"rgba(111,165,140,0.16)":c.sageSoft,borderRadius:99,padding:"3px 9px"}}>{r.tag.toUpperCase()}</span><span style={{fontSize:10.5,color:i===0?"rgba(255,255,255,0.5)":c.muted}}>{r.date} - {r.read}</span></div><div style={{fontSize:15.5,fontWeight:700,color:i===0?"white":c.ink,marginTop:10,lineHeight:1.3}}>{r.title}</div><div style={{fontSize:12,color:i===0?"rgba(255,255,255,0.65)":c.muted,marginTop:5,lineHeight:1.45}}>{r.teaser}</div></button>)}<div style={{fontSize:10.5,color:c.muted,margin:"4px 2px 20px",lineHeight:1.45}}>Our house view, written for you rather than for a committee.</div></>}
    {seg==="funds" && <>{RESEARCH.funds.map((f,i)=><Card key={i} style={{marginBottom:10,padding:15}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:9.5,fontWeight:700,color:c.muted,letterSpacing:"0.05em"}}>{f.type.toUpperCase()}</span><span style={{fontSize:10.5,color:c.muted}}>{f.date}</span></div><div style={{fontSize:14,fontWeight:700,color:c.ink,marginTop:7}}>{f.fund}</div><div style={{fontSize:10.5,color:c.pine,background:c.sageSoft,display:"inline-block",borderRadius:99,padding:"2px 8px",marginTop:5,fontWeight:600}}>{f.cat}</div><div style={{fontSize:12,color:c.muted,marginTop:8,lineHeight:1.5}}>{f.note}</div>{f.flag && <div style={{display:"flex",alignItems:"center",gap:6,marginTop:10,background:c.honeySoft,borderRadius:10,padding:"8px 10px"}}><I.bell size={12} color={c.honey}/><span style={{fontSize:11,color:c.ink,fontWeight:600}}>{f.flag}</span></div>}</Card>)}<div style={{fontSize:10.5,color:c.muted,margin:"4px 2px 20px",lineHeight:1.45}}>Letters, calls, and distributions for the funds you own. No inbox archaeology.</div></>}
  </div>;
}

// ---------------- NEXT GEN ----------------
function NextGen({tab}){
  const [invested,setInvested]=useState(false);
  if(tab==="home") return <div style={{padding:"6px 18px 0"}}>
    <div style={{background:c.pineDeep,borderRadius:22,padding:20,color:"white"}}>
      <Eyebrow><span style={{color:"rgba(255,255,255,0.55)"}}>{NG.trust}</span></Eyebrow>
      <div style={{fontSize:36,fontWeight:700,marginTop:6,fontVariantNumeric:"tabular-nums"}}>{big(NG.val)}</div>
      <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}><I.spark size={13} color={c.sage} w={2.2}/><span style={{color:c.sage,fontWeight:600,fontSize:13}}>+{NG.ytd}% this year</span></div>
    </div>
    <div style={{fontSize:12.5,color:c.muted,margin:"14px 2px 8px",lineHeight:1.5}}>This is <b style={{color:c.ink}}>your</b> share, not the whole family's. Here's what it's doing.</div>
    <Card><Eyebrow>What you're invested in</Eyebrow><div style={{marginTop:10}}><AllocRow data={ALLOC}/></div></Card>
    <Card style={{marginTop:12,padding:14}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><Eyebrow>Your taxes this year</Eyebrow><span style={{fontSize:9.5,fontWeight:700,color:c.pine,background:c.sageSoft,borderRadius:99,padding:"2px 8px"}}>YOUR TRUST</span></div><div style={{fontSize:12.5,color:c.muted,marginTop:8,lineHeight:1.45}}>We harvested <b style={{color:c.pine}}>{big(TAX.self.harvested)}</b> in losses in your trust, saving about <b style={{color:c.ink}}>{big(TAX.self.saved)}</b>. Nothing for you to do.</div></Card>
    <button style={{width:"100%",marginTop:12,marginBottom:20,border:"none",cursor:"pointer",background:c.sageSoft,color:c.pine,borderRadius:14,padding:14,fontWeight:700,fontSize:13.5,display:"flex",alignItems:"center",justifyContent:"center",gap:7}}><I.book size={16} color={c.pine}/> What does "diversifiers" even mean?</button>
  </div>;
  if(tab==="invest") return <Invest invested={invested} setInvested={setInvested} context="You have $40,000 in a checking account earning nothing." fundLabel="Move from checking"/>;
  if(tab==="plan") return <Plan start={1850000} contrib={24000} label="your money over time" grow/>;
  if(tab==="learn") return <Learn/>;
  return null;
}

// ---------------- PROSPECT ----------------
function Prospect({tab}){
  const [linked,setLinked]=useState([]);const [invested,setInvested]=useState(false);
  if(tab==="link") return <Link linked={linked} setLinked={setLinked}/>;
  if(tab==="plan") return <Plan start={linked.length?260000:0} contrib={30000} label="your plan" grow prospect={!linked.length}/>;
  if(tab==="invest") return <Invest invested={invested} setInvested={setInvested} context="No account minimum. Managed by Sepio, a fiduciary." fundLabel="Fund your account"/>;
  if(tab==="learn") return <Learn/>;
  return null;
}
function Link({linked,setLinked}){
  const banks=[["Fidelity",148000],["Chase",22000],["Schwab",64000],["Robinhood",26000]];
  const total=linked.reduce((s,n)=>s+banks.find(b=>b[0]===n)[1],0);
  return <div style={{padding:"6px 18px 0"}}>
    <Eyebrow>Get started</Eyebrow><div style={{fontSize:22,fontWeight:700,color:c.ink,margin:"3px 0 4px"}}>See everything in one place</div>
    <div style={{fontSize:12.5,color:c.muted,marginBottom:16,lineHeight:1.5}}>Link your accounts to get a real plan. No advisor call, no commitment. Secured by Plaid.</div>
    {banks.map(([n,v])=>{const on=linked.includes(n);return <button key={n} onClick={()=>setLinked(on?linked.filter(x=>x!==n):[...linked,n])} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",background:on?c.sageSoft:c.card,border:"1.5px solid "+(on?c.pine:c.line),borderRadius:14,padding:"14px 16px",marginBottom:10}}><span style={{display:"flex",alignItems:"center",gap:10}}><span style={{width:34,height:34,borderRadius:8,background:on?c.pine:c.stone,color:on?"white":c.muted,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14}}>{n[0]}</span><span style={{fontSize:14,fontWeight:600,color:c.ink}}>{n}</span></span>{on?<span style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13,fontWeight:700,color:c.ink}}>{big(v)}</span><I.check size={17} color={c.pine}/></span>:<span style={{fontSize:12,color:c.pine,fontWeight:700}}>Link</span>}</button>;})}
    {linked.length>0 && <Card style={{marginTop:6,background:c.pineDeep,border:"none"}}><Eyebrow><span style={{color:"rgba(255,255,255,0.55)"}}>Linked net worth</span></Eyebrow><div style={{fontSize:30,fontWeight:700,color:"white",marginTop:4,fontVariantNumeric:"tabular-nums"}}>{big(total)}</div><div style={{fontSize:11.5,color:"rgba(255,255,255,0.6)",marginTop:2}}>Now open Plan to see where it takes you.</div></Card>}
    <div style={{fontSize:10.5,color:c.muted,margin:"12px 2px 20px",lineHeight:1.45}}><I.lock size={10} color={c.muted}/> Held-away, read-only. We never move money you haven't authorized.</div>
  </div>;
}

// ---------------- shared: Invest, Plan, Learn ----------------
function Invest({invested,setInvested,context,fundLabel}){
  const [step,setStep]=useState(0);const [ans,setAns]=useState([1,1,1]);
  const Q=[{q:"If your account dropped 20%, you'd:",o:["Sell","Wait","Buy more"]},{q:"You'll need this money in:",o:["<3 yrs","3-10 yrs","10+ yrs"]},{q:"You want to:",o:["Play it safe","Balance","Grow it"]}];
  const score=ans.reduce((s,x)=>s+x,0);const profile=score<=2?"Conservative":score<=5?"Balanced":"Growth";const M=MODELS[profile];
  if(invested) return <div style={{padding:"40px 24px",textAlign:"center"}}>
    <div style={{width:64,height:64,borderRadius:99,background:c.sageSoft,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 18px"}}><I.check size={32} color={c.pine} w={2.4}/></div>
    <div style={{fontSize:20,fontWeight:700,color:c.ink}}>You're invested.</div>
    <div style={{fontSize:13,color:c.muted,marginTop:8,lineHeight:1.5,maxWidth:280,margin:"8px auto 0"}}>Your {profile.toLowerCase()} portfolio is live and managed by Sepio. We rebalance and tax-manage it automatically. Nothing else to do.</div>
    <div style={{marginTop:20,padding:14,background:c.bg,borderRadius:14,textAlign:"left"}}><div style={{display:"flex",alignItems:"center",gap:8,color:c.pine,fontSize:12,fontWeight:700}}><I.shield size={14} color={c.pine}/> Managed account - discretionary</div><div style={{fontSize:11,color:c.muted,marginTop:5,lineHeight:1.45}}>A fiduciary and a CFA behind the button. Adjust or talk to a human anytime, but you never have to.</div></div>
    <button onClick={()=>{setInvested(false);setStep(0);}} style={{marginTop:18,border:"none",background:"transparent",color:c.muted,cursor:"pointer",fontSize:12,fontWeight:600}}>Reset demo</button>
  </div>;
  return <div style={{padding:"6px 18px 0"}}>
    <Eyebrow>Invest</Eyebrow><div style={{fontSize:22,fontWeight:700,color:c.ink,margin:"3px 0 4px"}}>{step===0?"Three quick questions":"Your recommended portfolio"}</div>
    <div style={{fontSize:12,color:c.muted,marginBottom:16,lineHeight:1.45}}>{context}</div>
    {step===0 && <>{Q.map((q,qi)=><div key={qi} style={{marginBottom:16}}><div style={{fontSize:13.5,fontWeight:600,color:c.ink,marginBottom:8}}>{q.q}</div><div style={{display:"flex",gap:7}}>{q.o.map((o,oi)=>{const on=ans[qi]===oi;return <button key={oi} onClick={()=>setAns(ans.map((x,i)=>i===qi?oi:x))} style={{flex:1,cursor:"pointer",border:"1.5px solid "+(on?c.pine:c.line),background:on?c.sageSoft:c.card,color:on?c.pine:c.ink,borderRadius:11,padding:"11px 4px",fontSize:12,fontWeight:on?700:500}}>{o}</button>;})}</div></div>)}<button onClick={()=>setStep(1)} style={{width:"100%",marginTop:4,marginBottom:20,border:"none",cursor:"pointer",background:c.pine,color:"white",borderRadius:14,padding:15,fontWeight:700,fontSize:15}}>See my portfolio</button></>}
    {step===1 && <>
      <Card><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><Eyebrow>{profile} portfolio</Eyebrow><span style={{fontSize:11,color:c.muted}}>managed by Sepio</span></div><div style={{marginTop:10}}><AllocRow data={M.a}/></div></Card>
      <div style={{display:"flex",gap:10,marginTop:12}}><Card style={{flex:1,padding:14}}><Eyebrow>Expected</Eyebrow><div style={{fontSize:22,fontWeight:700,color:c.pine,marginTop:6}}>{M.ret.toFixed(1)}%</div><div style={{fontSize:10.5,color:c.muted}}>long-term return</div></Card><Card style={{flex:1,padding:14}}><Eyebrow>Managed</Eyebrow><div style={{fontSize:14,fontWeight:700,color:c.ink,marginTop:8,lineHeight:1.3}}>Rebalanced +<br/>tax-managed</div></Card></div>
      <div style={{background:c.sageSoft,borderRadius:14,padding:"12px 14px",marginTop:12,display:"flex",gap:9}}><I.shield size={15} color={c.pine}/><div style={{fontSize:11.5,color:c.ink,lineHeight:1.45}}>This is a <b>managed account</b>, not a brokerage trade. Grant discretion once, then Sepio runs it. It feels like a button; there's a fiduciary behind it.</div></div>
      <button onClick={()=>setInvested(true)} style={{width:"100%",marginTop:14,border:"none",cursor:"pointer",background:c.pine,color:"white",borderRadius:14,padding:16,fontWeight:700,fontSize:15}}>{fundLabel} & invest</button>
      <button onClick={()=>setStep(0)} style={{width:"100%",marginTop:8,marginBottom:20,border:"none",background:"transparent",color:c.muted,cursor:"pointer",fontSize:12,fontWeight:600}}>Back</button>
    </>}
  </div>;
}
function Plan({start,contrib,label,grow,prospect}){
  const [yr,setYr]=useState(grow?20:30);const [amt,setAmt]=useState(grow?contrib:2800000);
  const res=useMemo(()=>runmc({start,contrib:grow?amt:-amt,years:yr,ret:6.5,vol:11}),[amt,yr,start]);
  const end=res.path[res.path.length-1];
  if(prospect) return <div style={{padding:"40px 24px",textAlign:"center"}}><div style={{fontSize:17,fontWeight:700,color:c.ink}}>Link an account first</div><div style={{fontSize:13,color:c.muted,marginTop:8,lineHeight:1.5}}>Open Link and connect at least one account, then your plan appears here.</div></div>;
  return <div style={{padding:"6px 18px 0"}}>
    <Eyebrow>{grow?"Your money over time":"Sustaining your plan"}</Eyebrow><div style={{fontSize:22,fontWeight:700,color:c.ink,margin:"3px 0 12px"}}>{grow?"Where this goes":"Will it last?"}</div>
    <Card style={{padding:"15px 10px 8px"}}><div style={{padding:"0 6px"}}><Eyebrow>Projected {label}</Eyebrow></div><div style={{marginTop:8}}><Fan path={res.path} years={yr}/></div>
      <div style={{display:"flex",gap:8,padding:"2px 6px 4px"}}><div style={{flex:1,background:c.bg,borderRadius:10,padding:"9px 10px"}}><div style={{fontSize:14,fontWeight:700,color:c.ink}}>{big(end.p50)}</div><div style={{fontSize:9.5,color:c.muted}}>median</div></div><div style={{flex:1,background:c.bg,borderRadius:10,padding:"9px 10px"}}><div style={{fontSize:14,fontWeight:700,color:c.pine}}>{big(end.p90)}</div><div style={{fontSize:9.5,color:c.muted}}>upside</div></div><div style={{flex:1,background:c.bg,borderRadius:10,padding:"9px 10px"}}><div style={{fontSize:14,fontWeight:700,color:c.clay}}>{big(end.p10)}</div><div style={{fontSize:9.5,color:c.muted}}>low</div></div></div>
    </Card>
    <Card style={{marginTop:12}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}><span style={{fontSize:12.5,color:c.ink,fontWeight:600}}>{grow?"Add per year":"Spend per year"}</span><span style={{fontSize:13,color:c.pine,fontWeight:700}}>{big(amt)}</span></div><input type="range" min={grow?0:500000} max={grow?60000:5000000} step={grow?1000:100000} value={amt} onChange={e=>setAmt(Number(e.target.value))} style={{width:"100%"}}/><div style={{display:"flex",justifyContent:"space-between",margin:"14px 0 7px"}}><span style={{fontSize:12.5,color:c.ink,fontWeight:600}}>Years</span><span style={{fontSize:13,color:c.pine,fontWeight:700}}>{yr}</span></div><input type="range" min={5} max={40} step={1} value={yr} onChange={e=>setYr(Number(e.target.value))} style={{width:"100%"}}/></Card>
    <div style={{fontSize:10.5,color:c.muted,margin:"12px 2px 20px",lineHeight:1.45}}>{SIMS} simulated markets. Illustrative, reviewed by your advisor before it becomes your plan.</div>
  </div>;
}
function Learn(){
  const items=[["Why we build by role, not asset class","5 min"],["What direct indexing does for your taxes","4 min"],["How a trust works, in plain English","6 min"],["Diversifiers: the money that zigs when stocks zag","3 min"]];
  return <div style={{padding:"6px 18px 0"}}><Eyebrow>Learn</Eyebrow><div style={{fontSize:22,fontWeight:700,color:c.ink,margin:"3px 0 14px"}}>Understand your money</div>
    {items.map(([t,r],i)=><button key={i} style={{width:"100%",textAlign:"left",cursor:"pointer",background:i===0?c.pineDeep:c.card,border:"1px solid "+(i===0?c.pineDeep:c.line),borderRadius:16,padding:16,marginBottom:10}}><div style={{fontSize:9.5,fontWeight:700,letterSpacing:"0.05em",color:i===0?c.sage:c.pine}}>{i===0?"START HERE":"EXPLAINER"}</div><div style={{fontSize:14.5,fontWeight:700,color:i===0?"white":c.ink,marginTop:8,lineHeight:1.3}}>{t}</div><div style={{fontSize:11,color:i===0?"rgba(255,255,255,0.6)":c.muted,marginTop:6}}>{r} read</div></button>)}
    <div style={{fontSize:10.5,color:c.muted,margin:"4px 2px 20px",lineHeight:1.45}}>Plain-language explainers, written for you, not for a committee.</div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
